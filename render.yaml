services:
  - type: web
    name: smart-attend-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /healthz
    envVars:
      - key: TF_USE_LEGACY_KERAS
        value: "1"
      - key: PYTHON_VERSION
        value: 3.11.9
